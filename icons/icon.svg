<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 128 128">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Shopping cart -->
  <g filter="url(#shadow)">
    <!-- Cart body -->
    <path d="M 32 45 L 36 70 Q 36 74 40 74 L 76 74 Q 80 74 80 70 L 84 45 Z" 
          fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
    
    <!-- Cart handle -->
    <path d="M 30 45 L 28 38 Q 28 36 30 36 L 86 36 Q 88 36 88 38 L 86 45" 
          fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Cart wheels -->
    <circle cx="44" cy="80" r="4" fill="#9ca3af"/>
    <circle cx="72" cy="80" r="4" fill="#9ca3af"/>
  </g>

  <!-- Pokemon cards in cart -->
  <g filter="url(#shadow)">
    <!-- Yellow card (back left) -->
    <g transform="rotate(-8 48 55)">
      <rect x="38" y="42" width="20" height="28" rx="3" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="48" cy="56" r="4" fill="#ffffff" opacity="0.9"/>
    </g>
    
    <!-- Blue card (middle) -->
    <g transform="rotate(5 58 54)">
      <rect x="48" y="40" width="20" height="28" rx="3" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
      <circle cx="58" cy="54" r="4" fill="#ffffff" opacity="0.9"/>
    </g>
    
    <!-- Red card (front right) -->
    <g transform="rotate(-12 68 52)">
      <rect x="58" y="38" width="20" height="28" rx="3" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
      <circle cx="68" cy="52" r="4" fill="#ffffff" opacity="0.9"/>
    </g>
  </g>

  <!-- Sparkle effect -->
  <g fill="#fde047" opacity="0.8">
    <circle cx="24" cy="50" r="2"/>
    <circle cx="92" cy="48" r="2.5"/>
    <circle cx="84" cy="28" r="1.5"/>
  </g>
</svg>
