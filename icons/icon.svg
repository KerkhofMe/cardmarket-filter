<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 128 128">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Shopping cart -->
  <g filter="url(#shadow)">
    <!-- Cart body -->
    <path d="M 20 50 L 28 90 Q 28 96 34 96 L 94 96 Q 100 96 100 90 L 108 50 Z" 
          fill="#ffffff" stroke="#e5e7eb" stroke-width="3"/>
    
    <!-- Cart handle -->
    <path d="M 16 50 L 12 36 Q 12 32 16 32 L 112 32 Q 116 32 116 36 L 112 50" 
          fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Cart wheels -->
    <circle cx="42" cy="106" r="6" fill="#9ca3af"/>
    <circle cx="86" cy="106" r="6" fill="#9ca3af"/>
  </g>

  <!-- Pokemon cards in cart -->
  <g filter="url(#shadow)">
    <!-- Yellow card (back left) -->
    <g transform="rotate(-12 46 66)">
      <rect x="30" y="46" width="32" height="44" rx="4" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
      <circle cx="46" cy="68" r="6" fill="#ffffff" opacity="0.9"/>
    </g>
    
    <!-- Blue card (middle) -->
    <g transform="rotate(8 64 64)">
      <rect x="48" y="44" width="32" height="44" rx="4" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
      <circle cx="64" cy="66" r="6" fill="#ffffff" opacity="0.9"/>
    </g>
    
    <!-- Red card (front right) -->
    <g transform="rotate(-18 82 62)">
      <rect x="66" y="42" width="32" height="44" rx="4" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
      <circle cx="82" cy="64" r="6" fill="#ffffff" opacity="0.9"/>
    </g>
  </g>

  <!-- Sparkle effect -->
  <g fill="#fde047" opacity="0.8">
    <circle cx="12" cy="60" r="3"/>
    <circle cx="116" cy="56" r="3.5"/>
    <circle cx="104" cy="24" r="2.5"/>
  </g>
</svg>
